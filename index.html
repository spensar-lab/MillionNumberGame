<!DOCTYPE html>
<html>

<head>

<title>Daily Million</title>

<style>

body {
    font-family: Arial, sans-serif;
    background:#111827;
    color:white;
    text-align:center;
    padding-top:50px;
}

.box {
    background:#1f2937;
    width:400px;
    max-width:90%;
    margin:auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px black;
}

h1 {
    font-size:40px;
}

input {
    padding:15px;
    font-size:22px;
    width:80%;
    border-radius:10px;
    border:none;
    text-align:center;
}

button {
    margin-top:20px;
    padding:15px;
    width:90%;
    font-size:20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

button:hover {
    background:#1d4ed8;
}

.guess-card {

    background:#374151;
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    font-size:20px;

}


#result {

    margin-top:20px;

}


.small {

    color:#d1d5db;
    font-size:18px;

}


</style>

</head>


<body>


<div class="box">


<h1>🎯 Daily Million</h1>


<p>
Guess the daily number between
<br>
1 and 1,000,000
</p>


<h2 id="guessesLeft">
Guesses Left: 6
</h2>


<input 
id="guess"
type="number"
placeholder="Your guess"
min="1"
max="1000000"
>


<br>


<button onclick="checkGuess()">

Guess

</button>


<h2 id="result"></h2>


<div id="history"></div>


<p id="countdown" class="small"></p>


</div><script>


function getDailyNumber(){

    let today = new Date();

    let seed =
    today.getFullYear() +
    today.getMonth() +
    today.getDate();


    let random = Math.sin(seed) * 1000000;


    return Math.floor(Math.abs(random));

}



let answer = getDailyNumber();



let todayKey =
"dailyMillion_" +
new Date().toDateString();



let game = JSON.parse(
localStorage.getItem(todayKey)
);



if(game == null){

    game = {

        guesses:[],
        finished:false

    };

    localStorage.setItem(
        todayKey,
        JSON.stringify(game)
    );

}




function updateScreen(){


let history =
document.getElementById("history");


let guessesLeft =
document.getElementById("guessesLeft");



history.innerHTML = "";



game.guesses.forEach(function(item,index){


history.innerHTML +=

`
<div class="guess-card">

Guess ${index + 1}

<br>

${item.number}

<br>

${item.message}

</div>

`;


});



guessesLeft.innerHTML =

"Guesses Left: " +
(6 - game.guesses.length);



if(game.finished){

    document.getElementById("guess").disabled=true;

}


}



function checkGuess(){


if(game.finished){

    return;

}



let input =
document.getElementById("guess");



let guess =
Number(input.value);



if(
guess < 1 ||
guess > 1000000 ||
input.value === ""
){

alert(
"Enter a number between 1 and 1,000,000"
);

return;

}



let message = "";



if(guess == answer){


message = "🎉 Correct!";


game.finished=true;


document.getElementById("result").innerHTML =

"🎉 You solved Daily Million!";


}



else if(guess > answer){


message = "⬇️ Too High";


}



else{


message = "⬆️ Too Low";


}




game.guesses.push({

number:guess,

message:message

});



if(game.guesses.length >= 6 && guess != answer){


game.finished=true;


document.getElementById("result").innerHTML =

"Game Over! Come back tomorrow.";


}



localStorage.setItem(

todayKey,

JSON.stringify(game)

);



input.value="";


updateScreen();


}


updateScreen();

function updateCountdown(){

    let now = new Date();

    let tomorrow = new Date();

    tomorrow.setHours(24,0,0,0);


    let difference =
    tomorrow - now;


    let hours =
    Math.floor(
        difference / (1000 * 60 * 60)
    );


    let minutes =
    Math.floor(
        (difference % (1000 * 60 * 60)) /
        (1000 * 60)
    );


    let seconds =
    Math.floor(
        (difference % (1000 * 60)) /
        1000
    );


    document.getElementById("countdown").innerHTML =

    "Next Daily Million in: " +
    hours + "h " +
    minutes + "m " +
    seconds + "s";

}



setInterval(updateCountdown,1000);

updateCountdown();



document.getElementById("guess")
.addEventListener(
"keydown",
function(event){

    if(event.key === "Enter"){

        checkGuess();

    }

});



</script>


</body>

</html>
